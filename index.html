<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --glass: rgba(15, 23, 42, 0.4); 
            --glass-header: rgba(49, 46, 129, 0.3);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --purple: #9d50bb;
            --pink: #6e48aa;
            --text: #f1f5f9;
            --warning: #ff9800;
            --danger: #ff4b2b;
        }

        body {
            font-family: 'Kanit', sans-serif;
            font-weight: 400;
            background: radial-gradient(circle at top right, #1e293b, #0b0f1a);
            color: var(--text);
            padding: 15px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h2, h3, .header-bar, .nav-btn, .btn-glass-add, th, .pill.active, #table-month-indicator, .stat-item small {
            font-weight: 600; 
        }

        .header-bar { 
            background: var(--glass-header); 
            backdrop-filter: blur(10px);
            padding: 12px 20px; 
            margin: -15px -15px 25px -15px; 
            font-size: 0.85rem; 
            color: #94a3b8; 
            border-bottom: 1px solid var(--border);
        }

        .nav { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 25px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 5px; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav::-webkit-scrollbar { display: none; }

        .nav-btn { 
            background: none; border: none; color: #64748b; cursor: pointer; 
            font-size: 0.9rem; display: flex; align-items: center; gap: 8px; 
            padding: 10px 5px; transition: 0.3s; white-space: nowrap; 
        }
        .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* GLASS PILLS MOBILE-READY STYLING */
        .month-pills {
            display: flex; 
            gap: 10px; 
            margin-bottom: 25px; 
            overflow-x: auto; 
            padding: 5px 2px;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .month-pills::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .pill {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            flex-shrink: 0; /* Prevents pills from squishing on mobile */
        }

        .pill.active {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 20px; 
        }

        .btn-glass-add { 
            background: linear-gradient(45deg, rgba(157, 80, 187, 0.6), rgba(110, 72, 170, 0.6)); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 14px; border-radius: 16px; 
            cursor: pointer; width: 100%; font-size: 1rem;
            font-family: 'Kanit', sans-serif;
        }

        input, select { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border); 
            color: white; padding: 14px; border-radius: 14px; font-size: 1rem;
            width: 100%; box-sizing: border-box; margin-bottom: 12px;
            font-family: 'Kanit', sans-serif;
        }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        
        .stat-item { 
            text-align: center; background: rgba(255, 255, 255, 0.03); 
            padding: 15px; border-radius: 20px; border: 1px solid var(--border); 
        }
        
        .stat-item h2 { margin: 8px 0 2px 0; font-size: 1.2rem; color: var(--accent); }

        .table-wrap { overflow-x: auto; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 14px; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 14px; border-top: 1px solid var(--border); font-size: 0.85rem; color: #cbd5e1; }

        .section { display: none; }
        .section.active { display: block; }

        .modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(25px);
            padding: 25px; border-radius: 28px; z-index: 100; 
            border: 1px solid var(--border); width: 90%; max-width: 380px; 
        }
        .modal.active { display: block; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99; }
        .overlay.active { display: block; }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stat-item h2 { font-size: 1rem; }
            .pill { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="header-bar" id="current-date">Loading...</div>

    <div class="nav">
        <button class="nav-btn active" id="btn-dashboard" onclick="showSection('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" id="btn-salary" onclick="showSection('salary')">💰 Salary</button>
        <button class="nav-btn" id="btn-installments" onclick="showSection('installments')">💳 Installments</button>
        <button class="nav-btn" id="btn-savings" onclick="showSection('savings')">📈 Savings</button>
        <button class="nav-btn" id="btn-daily" onclick="showSection('daily')">📄 Daily</button>
    </div>

    <div id="dashboard" class="section active">
        <div class="glass-card">
            <div style="font-weight:600; font-size: 0.9rem; margin-bottom: 12px;">Quick Add</div>
            <input type="text" id="dash-item" placeholder="Item">
            <input type="number" id="dash-amt" placeholder="Amount">
            <select id="dash-cat" class="category-dropdown"></select>
            <button class="btn-glass-add" onclick="submitEntry('Daily Tracker', ['dash-item','dash-amt','dash-cat'])">Add</button>
        </div>

        <div class="month-pills" id="month-pills"></div>
        
        <div class="stats-grid">
            <div class="stat-item"><h2 id="total-salary">₱0</h2><small>Salary</small></div>
            <div class="stat-item"><h2 id="total-spent">₱0</h2><small>Spent</small></div>
            <div class="stat-item"><h2 id="total-trans">0</h2><small>Items</small></div>
            <div class="stat-item"><h2 id="daily-avg">₱0</h2><small>Daily Avg</small></div>
            <div class="stat-item" style="grid-column: 1 / -1; border-color: var(--accent);"><h2 id="total-savings-dash">₱0</h2><small>Savings Balance</small></div>
        </div>
        <div class="glass-card"><div style="height:200px;"><canvas id="monthlyChart"></canvas></div></div>
    </div>

    <div id="daily" class="section">
        <button class="btn-glass-add" style="margin-bottom:15px;" onclick="openModal('expenseModal')">+ Add Expense</button>
        <div class="glass-card">
            <div id="table-month-indicator" style="padding-bottom: 10px; color: var(--accent); font-size: 0.9rem;">Viewing: ...</div>
            <div class="table-wrap">
                <table id="expenseTable">
                    <thead><tr><th>ID</th><th>Item</th><th>Amount</th><th>Date</th><th>Category</th><th>Month</th><th>Actions</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="salary" class="section">
        <button class="btn-glass-add" style="margin-bottom:15px;" onclick="openModal('salaryModal')">+ Add Salary</button>
        <div class="glass-card table-wrap">
            <table id="salaryTable">
                <thead><tr><th>ID</th><th>Source</th><th>Amount</th><th>Date</th>
<th style="alignment: right;">Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="installments" class="section">
        <button class="btn-glass-add" style="margin-bottom:15px;" onclick="openModal('instModal')">+ New Plan</button>
        <div class="glass-card table-wrap">
            <table id="instTable">
                <thead><tr><th>ID</th><th>Product</th><th>Total</th><th>Monthly</th><th>Rem.</th><th>Due</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="savings" class="section">
        <button class="btn-glass-add" style="margin-bottom:15px;" onclick="prepareSavingsModal()">+ New Goal</button>
        <div class="glass-card table-wrap">
            <table id="savingsTable">
                <thead><tr><th>ID</th><th>Goal</th><th>Target</th><th>Current</th><th>Last Updated</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllModals()"></div>
    <div id="expenseModal" class="modal"><h3>Add Expense</h3><input type="text" id="exp-item" placeholder="Item"><input type="number" id="exp-amt" placeholder="Amount"><select id="exp-cat" class="category-dropdown"></select><button class="btn-glass-add" onclick="submitEntry('Daily Tracker', ['exp-item','exp-amt','exp-cat'])">Save</button></div>
    <div id="salaryModal" class="modal"><h3>Add Salary</h3><input type="text" id="sal-source" placeholder="Source"><input type="number" id="sal-amt" placeholder="Amount"><button class="btn-glass-add" onclick="submitEntry('Salary', ['sal-source','sal-amt'])">Save</button></div>
    <div id="instModal" class="modal"><h3>New Plan</h3><input type="text" id="ins-prod" placeholder="Product"><input type="number" id="ins-total" placeholder="Total"><input type="number" id="ins-month" placeholder="Monthly"><input type="number" id="ins-rem" placeholder="Remaining"><input type="text" id="ins-due" placeholder="Due Date"><button class="btn-glass-add" onclick="submitEntry('Installments', ['ins-prod','ins-total','ins-month','ins-rem','ins-due'])">Save</button></div>
    <div id="savingsModal" class="modal"><h3 id="sav-title">Goal</h3><input type="hidden" id="sav-id"><input type="text" id="sav-goal" placeholder="Goal"><input type="number" id="sav-target" placeholder="Target"><input type="number" id="sav-current" placeholder="Current"><button class="btn-glass-add" onclick="submitEntry('Savings', ['sav-goal','sav-target','sav-current'], document.getElementById('sav-id').value)">Save</button></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwdb_CQHcB9RI8tW6XQHlHQT7GGp_9FkAHzlwCg1Vhw1K7PvUOdbyA8lhFn-fpoIaQ/exec';
        let state = { expenses: [], salary: [], savings: [], installments: [] };
        let selectedMonth = new Date().toLocaleString('default', { month: 'long' });
        let myChart = null;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        async function init() {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            try {
                const res = await fetch(`${SCRIPT_URL}?action=dashboard`);
                const raw = await res.json();
                state = { expenses: raw.expenses || [], salary: raw.salary || [], installments: raw.installments || [], savings: raw.savings || [] };
                updateDropdowns();
                renderPills();
                updateDashboardUI();
                renderAll();
            } catch (e) { console.error("Sync failed", e); }
        }

        function renderTable(tableId, data, sheetName) {
            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = data.map(item => {
                if(!item.id || item.values[0] === 'Product' || item.values[0] === 'Goal' || item.values[0] === 'Source') return '';
                let editBtn = (sheetName === 'Savings') ? `<button onclick="editSavings('${item.id}', '${item.values[0]}', '${item.values[1]}', '${item.values[2]}')" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:1rem; margin-right:8px;">✏️</button>` : '';
                const cells = item.values.map(v => `<td>${(typeof v === 'string' && v.includes('T')) ? v.split('T')[0] : v || ''}</td>`).join('');
                return `<tr><td>${item.id}</td>${cells}<td>${editBtn}<button onclick="deleteEntry('${sheetName}', '${item.id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:1rem;">❌</button></td></tr>`;
            }).join('');
        }

        function renderPills() {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const container = document.getElementById('month-pills');
            container.innerHTML = months.map(m => {
                const count = state.expenses.filter(e => e.values[4] === m).length;
                if (count === 0 && m !== selectedMonth) return ''; 
                return `<div class="pill ${m === selectedMonth ? 'active' : ''}" onclick="changeMonth('${m}')">${m} (${count})</div>`;
            }).join('');
        }

        function changeMonth(m) { selectedMonth = m; renderPills(); updateDashboardUI(); renderAll(); }

        function updateDashboardUI() {
            let totalSpent = 0, trans = 0, totalSalary = 0, totalSavings = 0;
            state.salary.forEach(s => { if(new Date(s.values[2]).toLocaleString('default', { month: 'long' }) === selectedMonth) totalSalary += parseFloat(s.values[1]) || 0; });
            state.expenses.forEach(e => { if (e.values[4] === selectedMonth) { totalSpent += parseFloat(e.values[1]) || 0; trans++; } });
            state.savings.forEach(sv => { if(sv.values[2]) totalSavings += parseFloat(sv.values[2]) || 0; });
            document.getElementById('total-salary').innerText = `₱${totalSalary.toLocaleString()}`;
            document.getElementById('total-spent').innerText = `₱${totalSpent.toLocaleString()}`;
            document.getElementById('total-trans').innerText = trans;
            document.getElementById('daily-avg').innerText = `₱${(totalSpent/30).toFixed(0)}`;
            document.getElementById('total-savings-dash').innerText = `₱${totalSavings.toLocaleString()}`;
            renderChart();
        }

        function renderAll() {
            renderTable('expenseTable', state.expenses.filter(e => e.values[4] === selectedMonth), 'Daily Tracker');
            renderTable('salaryTable', state.salary, 'Salary');
            renderTable('savingsTable', state.savings, 'Savings');
            renderTable('instTable', state.installments, 'Installments');
            document.getElementById('table-month-indicator').innerText = `Viewing: ${selectedMonth}`;
        }

        async function submitEntry(sheet, fields, id = null) {
            const btn = event.target; btn.innerText = "Wait...";
            const data = fields.map(fid => document.getElementById(fid).value);
            const now = new Date();
            let finalData = (sheet === 'Daily Tracker') ? [data[0], data[1], now.toISOString().split('T')[0], data[2], now.toLocaleString('default', { month: 'long' })] : 
                            (sheet === 'Salary') ? [data[0], data[1], now.toLocaleDateString()] : 
                            (sheet === 'Savings') ? [data[0], data[1], data[2], now.toLocaleDateString()] : data;
            let url = `${SCRIPT_URL}?action=${id ? 'updateEntry' : 'addEntry'}&sheet=${sheet}&data=${encodeURIComponent(JSON.stringify(finalData))}${id ? `&id=${id}` : ''}`;
            await fetch(url); location.reload();
        }

        async function deleteEntry(sheet, id) { if (confirm('Delete?')) { await fetch(`${SCRIPT_URL}?action=deleteEntry&sheet=${sheet}&id=${id}`); location.reload(); } }
        function openModal(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('overlay').classList.remove('active'); }
        function prepareSavingsModal() { document.getElementById('sav-title').innerText = "New Goal"; document.getElementById('sav-id').value = ""; document.getElementById('sav-goal').value = ""; document.getElementById('sav-target').value = ""; document.getElementById('sav-current').value = ""; openModal('savingsModal'); }
        function editSavings(id, goal, target, current) { document.getElementById('sav-title').innerText = "Edit Goal"; document.getElementById('sav-id').value = id; document.getElementById('sav-goal').value = goal; document.getElementById('sav-target').value = target; document.getElementById('sav-current').value = current; openModal('savingsModal'); }

        function updateDropdowns() {
            const dropdowns = document.querySelectorAll('.category-dropdown');
            const defaults = ["Food & Diet", "Household Bills", "Others"];
            const instList = state.installments.map(i => i.values[0]).filter(n => n && n !== 'Product');
            let html = `<option value="">Select Category</option>`;
            defaults.forEach(d => html += `<option value="${d}">${d}</option>`);
            instList.forEach(p => html += `<option value="${p}">${p}</option>`);
            dropdowns.forEach(d => d.innerHTML = html);
        }

        function renderChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            const months = ["January", "February", "March", "April", "May", "June"];
            const data = months.map(m => state.expenses.filter(e => e.values[4] === m).reduce((acc, curr) => acc + (parseFloat(curr.values[1]) || 0), 0));
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: months, datasets: [{ data: data, backgroundColor: months.map(m => m === selectedMonth ? '#9d50bb' : 'rgba(255,255,255,0.05)'), borderRadius: 10 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: '#64748b', font: { family: 'Kanit' } } } }, plugins: { legend: { display: false } } }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
